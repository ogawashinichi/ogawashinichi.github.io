<!doctype html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理画面 | 新聞記者のもやもや話</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css" />
    <style>
        .admin-container {
            max-width: 600px;
            margin: 2rem auto;
        }

        .admin-card {
            background: var(--color-card-bg);
            border: 4px solid var(--color-border);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            box-shadow: 8px 8px 0px var(--color-border);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--color-text);
            font-weight: 900;
            font-size: 1.1rem;
        }

        .form-control {
            width: 100%;
            padding: 1rem;
            background: #fff;
            border: 3px solid var(--color-border);
            border-radius: 12px;
            color: var(--color-text);
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: 500;
            transition: all 0.2s;
            box-shadow: inset 2px 2px 0px rgba(0, 0, 0, 0.05);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: inset 0px 0px 0px, 4px 4px 0px var(--color-primary);
        }

        .submit-btn {
            width: 100%;
            padding: 1.2rem;
            background: var(--color-primary);
            color: white;
            border: 4px solid var(--color-border);
            border-radius: 16px;
            font-family: inherit;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 4px 4px 0px var(--color-border);
        }

        .submit-btn:hover:not(:disabled) {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--color-border);
        }

        .submit-btn:active:not(:disabled) {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--color-border);
        }

        .submit-btn:disabled {
            background: #ced6e0;
            color: #747d8c;
            cursor: not-allowed;
        }

        .status {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 12px;
            border: 3px solid var(--color-border);
            font-weight: 700;
            display: none;
        }

        .status.loading {
            display: block;
            background: #ffeaa7;
            color: #d35400;
        }

        .status.success {
            display: block;
            background: #55efc4;
            color: #00b894;
        }

        .status.error {
            display: block;
            background: #ff7675;
            color: #c0392b;
        }

        nav {
            margin-bottom: 2rem;
            text-align: center;
        }

        nav a {
            display: inline-block;
            color: var(--color-text);
            font-weight: 900;
            text-decoration: none;
            background: var(--color-card-bg);
            padding: 0.6rem 1.8rem;
            border: 3px solid var(--color-border);
            border-radius: 20px;
            box-shadow: 4px 4px 0px var(--color-border);
            transition: all 0.2s;
        }

        nav a:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--color-primary);
            color: var(--color-primary);
            border-color: var(--color-primary);
        }
    </style>
</head>

<body>
    <!-- Background shapes -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div id="app">
        <header class="pop-header" style="padding: 2.5rem 0; margin-bottom: 2rem;">
            <div class="header-container">
                <h1 class="site-title"
                    style="font-size: 2.5rem; color: var(--color-primary); -webkit-text-stroke: 1.5px var(--color-border);">
                    管理画面</h1>
            </div>
        </header>

        <main class="container admin-container">
            <nav>
                <a href="/">&larr; サイトトップに戻る</a>
            </nav>

            <div class="admin-card">
                <h2 style="font-weight: 900; margin-bottom: 1.5rem; color: var(--color-text);">スペースを追加</h2>
                <form id="add-space-form">
                    <div class="form-group">
                        <label for="url">X (Twitter) スペース URL *</label>
                        <input type="url" id="url" class="form-control" required
                            placeholder="https://twitter.com/i/spaces/..." />
                    </div>
                    <div class="form-group">
                        <label for="title">タイトル *</label>
                        <input type="text" id="title" class="form-control" required placeholder="エピソードのタイトル" />
                    </div>
                    <div class="form-group">
                        <label for="date">日付</label>
                        <input type="text" id="date" class="form-control" placeholder="2026.03.10 (空欄の場合は今日)" />
                    </div>
                    <div class="form-group">
                        <label for="description">概要</label>
                        <textarea id="description" class="form-control" rows="3" placeholder="エピソードの説明"></textarea>
                    </div>
                    <button type="submit" id="submit-btn" class="submit-btn">ダウンロードして追加</button>
                </form>

                <div id="status-message" class="status"></div>
            </div>
        </main>
    </div>

    <script>
        document.getElementById('add-space-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const url = document.getElementById('url').value;
            const title = document.getElementById('title').value;
            const date = document.getElementById('date').value;
            const description = document.getElementById('description').value;

            const submitBtn = document.getElementById('submit-btn');
            const statusMsg = document.getElementById('status-message');

            // Setup Loading State
            submitBtn.disabled = true;
            submitBtn.textContent = 'ダウンロード中...';
            statusMsg.className = 'status loading';
            statusMsg.textContent = '音声をダウンロードして保存しています...';

            try {
                const response = await fetch('http://localhost:3000/api/spaces/download', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ url, title, date, description })
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || 'ダウンロードに失敗しました');
                }

                statusMsg.className = 'status success';
                statusMsg.textContent = '追加が完了しました！トップページに反映されています。';
                document.getElementById('add-space-form').reset();

            } catch (error) {
                console.error(error);
                statusMsg.className = 'status error';
                statusMsg.textContent = `エラー: ${error.message}`;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'ダウンロードして追加';
            }
        });
    </script>
</body>

</html>
